<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CALCULATOR</title>
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div id="calculator">
     <div id="layar">
      <p id="display"></p>
      <p id="angka"><p>
     </div>

    <div id="buttoncalcu" >
       <div id="calcu1" class="calcu1">
        <button value="clear" class="operation">C</button>
        <button class="operation" value="/">/</button>
       </div>
       <div id="calcu2">
        <button class="button" value="7">7</button>
        <button class="button" value="8">8</button>
        <button class="button" value="9">9</button>
        <button class="operation" value="x">x</button>
       </div>
       <div id="calcu3">
        <button class="button" value="4">4</button>
        <button class="button" value="5">5</button>
        <button class="button" value="6">6</button>
        <button class="operation" value="-">-</button>
       </div>
       <div id="calcu4">
        <button class="button" value="1">1</button>
        <button class="button" value="2">2</button>
        <button class="button" value="3">3</button>
        <button class="operation" value="+">+</button>
       </div>
       <div id="calcu5" class="calcu5">
        <button class="button" value="0">0</button>
       <button class="operation" value="=" >=</button>      
       </div>
    </div>
    </body>
</html>
